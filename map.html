<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Карта ТП — Трансформаторные подстанции</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Manrope:wght@400;500;600;700&display=swap');

  /* ====== DARK THEME (default) ====== */
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --border: #30363d;
    --accent: #f78166;
    --accent2: #56d364;
    --accent3: #79c0ff;
    --text: #e6edf3;
    --muted: #8b949e;
    --yellow: #e3b341;
    --orange: #f0883e;
    --item-hover: rgba(255,255,255,0.03);
    --item-active-bg: rgba(121,192,255,0.07);
    --search-bg: #0d1117;
    --map-tile: dark;
  }

  /* ====== LIGHT THEME ====== */
  [data-theme="light"] {
    --bg: #f6f8fa;
    --panel: #ffffff;
    --border: #d0d7de;
    --accent: #cf222e;
    --accent2: #1a7f37;
    --accent3: #0969da;
    --text: #1f2328;
    --muted: #656d76;
    --yellow: #9a6700;
    --orange: #bc4c00;
    --item-hover: rgba(0,0,0,0.04);
    --item-active-bg: rgba(9,105,218,0.08);
    --search-bg: #ffffff;
    --map-tile: light;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Manrope', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: background 0.2s, color 0.2s;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 16px;
    flex-wrap: wrap;
    transition: background 0.2s, border-color 0.2s;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--orange) 100%);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }

  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text);
    line-height: 1.3;
  }

  h1 span { color: var(--accent); }

  /* THEME TOGGLE */
  .theme-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .theme-toggle:hover { border-color: var(--accent3); color: var(--text); }
  .theme-icon { font-size: 13px; }

  .stats-bar {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--bg);
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    transition: background 0.2s, border-color 0.2s;
  }

  .stat-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .stat strong { color: var(--text); font-weight: 600; }

  /* BODY */
  .body {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* SIDEBAR */
  .sidebar {
    width: 300px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: background 0.2s, border-color 0.2s;
  }

  .sidebar-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--search-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    transition: border-color 0.2s;
  }

  .search-box:focus-within {
    border-color: var(--accent3);
  }

  .search-box input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    font-size: 12px;
    width: 100%;
  }

  .search-box input::placeholder { color: var(--muted); }

  .search-icon { color: var(--muted); font-size: 13px; flex-shrink: 0; }

  /* FILTER CHIPS */
  .filter-section {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }

  .filter-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all 0.15s;
    user-select: none;
  }

  .chip:hover { filter: brightness(1.15); }
  .chip.active { border-color: currentColor; filter: none; }
  .chip.inactive { opacity: 0.35; }

  .chip-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

  /* TP LIST */
  .tp-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .tp-list::-webkit-scrollbar { width: 4px; }
  .tp-list::-webkit-scrollbar-track { background: transparent; }
  .tp-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .tp-item {
    padding: 8px 16px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .tp-item:hover {
    background: var(--item-hover);
    border-left-color: var(--accent3);
  }

  .tp-item.active {
    background: var(--item-active-bg);
    border-left-color: var(--accent3);
  }

  .tp-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .tp-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }

  .tp-status-badge {
    display: inline-block;
    font-size: 9px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 3px;
    margin-top: 2px;
    width: fit-content;
  }

  .list-count {
    padding: 6px 16px;
    font-size: 10px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* MAP */
  #map {
    flex: 1;
    background: var(--bg);
  }

  /* POPUP */
  .leaflet-popup-content-wrapper {
    background: var(--panel) !important;
    color: var(--text) !important;
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3) !important;
    padding: 0 !important;
  }

  .leaflet-popup-content {
    margin: 0 !important;
    width: auto !important;
  }

  .leaflet-popup-tip {
    background: var(--panel) !important;
  }

  .leaflet-popup-close-button {
    color: var(--muted) !important;
  }

  .popup-inner {
    padding: 14px 16px;
    min-width: 240px;
    max-width: 300px;
  }

  .popup-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .popup-name {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 8px;
    color: var(--text);
  }

  .popup-coords {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent3);
    display: flex;
    gap: 12px;
    margin-bottom: 8px;
  }

  .popup-status {
    display: inline-block;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
    margin-bottom: 10px;
  }

  /* GEO LINKS */
  .popup-geo-links {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  .geo-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    text-decoration: none;
    border: 1px solid var(--border);
    color: var(--muted);
    background: var(--bg);
    transition: all 0.15s;
    cursor: pointer;
  }

  .geo-link:hover {
    border-color: var(--accent3);
    color: var(--accent3);
  }

  .geo-link-icon { font-size: 11px; }

  /* Cluster styles */
  .marker-cluster-small { background-color: rgba(86, 211, 100, 0.2) !important; }
  .marker-cluster-small div { background-color: rgba(86, 211, 100, 0.7) !important; color: #000 !important; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .marker-cluster-medium { background-color: rgba(227, 179, 65, 0.2) !important; }
  .marker-cluster-medium div { background-color: rgba(227, 179, 65, 0.7) !important; color: #000 !important; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .marker-cluster-large { background-color: rgba(247, 129, 102, 0.2) !important; }
  .marker-cluster-large div { background-color: rgba(247, 129, 102, 0.7) !important; color: #000 !important; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

  .no-results {
    padding: 24px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
  }

  /* Leaflet controls */
  .leaflet-control-zoom {
    border: 1px solid var(--border) !important;
    border-radius: 6px !important;
    overflow: hidden;
  }
  .leaflet-control-zoom a {
    background: var(--panel) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-zoom a:hover { background: var(--bg) !important; }

  /* SIDEBAR TOGGLE */
  .sidebar-toggle {
    position: absolute;
    top: 12px;
    left: 300px;
    z-index: 9999;
    width: 28px;
    height: 56px;
    border: 1px solid var(--border);
    border-left: none;
    border-radius: 0 6px 6px 0;
    background: var(--panel);
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s;
    box-shadow: 2px 0 6px rgba(0,0,0,0.15);
  }
  .sidebar-toggle:hover {
    color: var(--text);
    background: var(--bg);
  }

  /* Hidden state */
  .sidebar-hidden .sidebar {
    display: none !important;
  }
  .sidebar-hidden .sidebar-toggle {
    left: 0;
    border-left: 1px solid var(--border);
    border-radius: 0 6px 6px 0;
  }
  .sidebar-hidden #map {
    flex: 1 1 100%;
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">⚡</div>
    <div>
      <h1>КАРТА <span>ТП</span> — ТРАНСФОРМАТОРНЫЕ ПОДСТАНЦИИ</h1>
    </div>
  </div>
  <div class="header-right">
    <div class="stats-bar" id="statsBar"></div>
    <button class="theme-toggle" id="themeToggle" title="Переключить тему">
      <span class="theme-icon" id="themeIcon">☀️</span>
      <span id="themeLabel">Светлая</span>
    </button>
  </div>
</header>

<div class="body" id="bodyContainer">
  <button id="sidebarToggle" class="sidebar-toggle" title="Скрыть/показать панель">◀</button>

  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Объекты</div>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Поиск по названию или ID...">
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-label">Статус</div>
      <div class="chips" id="filterChips"></div>
    </div>

    <div class="tp-list" id="tpList"></div>
    <div class="list-count" id="listCount"></div>
  </div>

  <div id="map"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>

// ==================== THEME ====================
const themeToggle = document.getElementById('themeToggle');
const themeIcon = document.getElementById('themeIcon');
const themeLabel = document.getElementById('themeLabel');
let isDark = true;

let darkTile, lightTile;

function applyTheme() {
  if (isDark) {
    document.documentElement.removeAttribute('data-theme');
    themeIcon.textContent = '☀️';
    themeLabel.textContent = 'Светлая';
    if (lightTile) map.removeLayer(lightTile);
    if (darkTile) darkTile.addTo(map);
  } else {
    document.documentElement.setAttribute('data-theme', 'light');
    themeIcon.textContent = '🌙';
    themeLabel.textContent = 'Тёмная';
    if (darkTile) map.removeLayer(darkTile);
    if (lightTile) lightTile.addTo(map);
  }
  // Update popup styles on open popups
  document.querySelectorAll('.leaflet-popup-content-wrapper').forEach(el => {
    el.style.background = getComputedStyle(document.documentElement).getPropertyValue('--panel').trim();
  });
}

themeToggle.addEventListener('click', () => {
  isDark = !isDark;
  applyTheme();
});

const bodyContainer = document.getElementById('bodyContainer');

sidebarToggleBtn.addEventListener('click', () => {

  // Invalidate map size after transition
  setTimeout(() => { map.invalidateSize(); }, 50);

});

const clusterGroup = L.markerClusterGroup({

// ==================== STATE ====================
let hiddenStatuses = new Set(); // statuses that are HIDDEN (filtered out)
let searchQuery = '';
let markers = {};
let activeItem = null;

// ==================== ICON ====================
function createIcon(status) {
  const c = getColor(status);
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="24" viewBox="0 0 20 24">
    <path d="M10 0C4.5 0 0 4.5 0 10c0 7.5 10 14 10 14s10-6.5 10-14C20 4.5 15.5 0 10 0z" fill="${c.bg}"/>
    <text x="10" y="14" text-anchor="middle" font-size="10" font-weight="700" fill="${c.text}" font-family="monospace">T</text>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [20, 24],
    iconAnchor: [10, 24],
    popupAnchor: [0, -24]
  });
}

// ==================== POPUP WITH GEO LINKS ====================
function createPopup(tp) {
  const c = getColor(tp.status);
  const lat = tp.lat.toFixed(6);
  const lon = tp.lon.toFixed(6);

  // Universal geo URI (works on mobile: opens native maps app)
  const geoUri = `geo:${lat},${lon}?q=${lat},${lon}(${encodeURIComponent(tp.name)})`;
  // Yandex Maps
  const yandexUrl = `https://maps.yandex.ru/?pt=${lon},${lat}&z=17&l=map`;
  // Google Maps
  const googleUrl = `https://www.google.com/maps?q=${lat},${lon}`;
  // 2GIS
  const dgisUrl = `https://2gis.ru/geo/${lon},${lat}`;
  // OpenStreetMap
  const osmUrl = `https://www.openstreetmap.org/?mlat=${lat}&mlon=${lon}&zoom=17`;

  return `<div class="popup-inner">
    <div class="popup-id">${tp.id}</div>
    <div class="popup-name">${tp.name}</div>
    <div class="popup-coords">${lat}, ${lon}</div>
    <span class="popup-status" style="background:${c.bg};color:${c.text}">${tp.status}</span>
    <div class="popup-geo-links">
      <a class="geo-link" href="${yandexUrl}" target="_blank" title="Открыть в Яндекс.Картах">
        <span class="geo-link-icon">🗺</span>Яндекс
      </a>
      <a class="geo-link" href="${googleUrl}" target="_blank" title="Открыть в Google Maps">
        <span class="geo-link-icon">🌐</span>Google
      </a>
      <a class="geo-link" href="${dgisUrl}" target="_blank" title="Открыть в 2ГИС">
        <span class="geo-link-icon">📍</span>2ГИС
      </a>
      <a class="geo-link" href="${osmUrl}" target="_blank" title="Открыть в OpenStreetMap">
        <span class="geo-link-icon">🗾</span>OSM
      </a>
      <a class="geo-link" href="${geoUri}" title="Открыть в приложении карт">
        <span class="geo-link-icon">📱</span>geo://
      </a>
    </div>
  </div>`;
}

// ==================== BUILD MARKERS ====================
TP_DATA.forEach(tp => {
  const marker = L.marker([tp.lat, tp.lon], { icon: createIcon(tp.status) });
  marker.bindPopup(createPopup(tp), { maxWidth: 320 });
  marker.tp = tp;
  markers[tp.id] = marker;
});

// ==================== STATS BAR ====================
const statusCounts = {};
TP_DATA.forEach(tp => { statusCounts[tp.status] = (statusCounts[tp.status] || 0) + 1; });

const statsBar = document.getElementById('statsBar');
const topStatuses = Object.entries(statusCounts).sort((a,b) => b[1]-a[1]).slice(0,4);
topStatuses.forEach(([s, c]) => {
  const col = getColor(s);
  statsBar.innerHTML += `<div class="stat"><span class="stat-dot" style="background:${col.bg}"></span><strong>${c}</strong> ${s}</div>`;
});
statsBar.innerHTML += `<div class="stat"><strong>${TP_DATA.length}</strong> объектов</div>`;

// ==================== FILTER CHIPS ====================
const chipsContainer = document.getElementById('filterChips');
Object.entries(statusCounts).sort((a,b)=>b[1]-a[1]).forEach(([status, count]) => {
  const c = getColor(status);
  const chip = document.createElement('div');
  chip.className = 'chip active';
  chip.style.color = c.bg;
  chip.style.background = c.bg + '22';
  chip.dataset.status = status;
  chip.innerHTML = `<span class="chip-dot"></span>${status} <span style="opacity:0.6">(${count})</span>`;
  chip.addEventListener('click', () => {
    if (hiddenStatuses.has(status)) {
      // Re-enable
      hiddenStatuses.delete(status);
      chip.classList.remove('inactive');
      chip.classList.add('active');
    } else {
      // Hide
      hiddenStatuses.add(status);
      chip.classList.remove('active');
      chip.classList.add('inactive');
    }
    updateDisplay();
  });
  chipsContainer.appendChild(chip);
});

// ==================== FILTER LOGIC ====================
function getFiltered() {
  let result = TP_DATA;
  if (hiddenStatuses.size > 0) {
    result = result.filter(tp => !hiddenStatuses.has(tp.status));
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    result = result.filter(tp =>
      tp.name.toLowerCase().includes(q) || tp.id.toLowerCase().includes(q)
    );
  }
  return result;
}

// ==================== UPDATE DISPLAY ====================
function updateDisplay() {
  const filtered = getFiltered();

  // Update markers
  clusterGroup.clearLayers();
  filtered.forEach(tp => {
    clusterGroup.addLayer(markers[tp.id]);
  });

  // Update list
  const list = document.getElementById('tpList');
  list.innerHTML = '';

  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results">Нет объектов по фильтрам</div>';
  } else {
    const toShow = filtered.slice(0, 200);
    toShow.forEach(tp => {
      const c = getColor(tp.status);
      const item = document.createElement('div');
      item.className = 'tp-item';
      item.dataset.id = tp.id;
      item.innerHTML = `
        <div class="tp-id">${tp.id}</div>
        <div class="tp-name">${tp.name}</div>
        <span class="tp-status-badge" style="background:${c.bg}22;color:${c.bg}">${tp.status}</span>
      `;
      item.addEventListener('click', () => {
        flyToTP(tp);
      });
      list.appendChild(item);
    });

    if (filtered.length > 200) {
      const more = document.createElement('div');
      more.style.cssText = 'padding:8px 16px;font-size:10px;color:var(--muted);font-family:monospace;text-align:center;';
      more.textContent = `... ещё ${filtered.length - 200} объектов (уточните поиск)`;
      list.appendChild(more);
    }
  }

  document.getElementById('listCount').textContent = `Показано: ${filtered.length} объектов`;
}

// ==================== FLY TO ====================
function flyToTP(tp) {
  map.flyTo([tp.lat, tp.lon], 16, { duration: 1.2 });

  setTimeout(() => {
    const m = markers[tp.id];
    if (m) {
      clusterGroup.zoomToShowLayer(m, () => {
        m.openPopup();
      });
    }
  }, 1300);

  // Highlight in list
  document.querySelectorAll('.tp-item').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`.tp-item[data-id="${tp.id}"]`);
  if (el) {
    el.classList.add('active');
    el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

// ==================== SEARCH ====================
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  updateDisplay();
});

// ==================== INIT ====================
updateDisplay();
</script>
